version: '3.8'

services:
  reconx-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: reconx:latest
    container_name: reconx-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - RECONX_ENV=production
      - DATABASE_URL=postgresql+asyncpg://reconx:reconx_secure_pass@postgres/reconx
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:15-alpine
    container_name: reconx-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=reconx
      - POSTGRES_PASSWORD=reconx_secure_pass
      - POSTGRES_DB=reconx
    volumes:
      - reconx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconx -d reconx"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  reconx_pgdata:
