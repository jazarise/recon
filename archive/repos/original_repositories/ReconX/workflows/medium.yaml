name: Medium Recon Workflow
description: Balanced reconnaissance scan. Estimated time 15-60 minutes.
mode: medium
steps:
- id: s1
  plugin: dns_intelligence
  plugin_path: plugins/golden/dns_intelligence
  timeout: 120
  description: Full DNS Enumeration

- id: s2
  plugin: network_discovery
  plugin_path: plugins/golden/network_discovery
  timeout: 300
  description: Service Enumeration and Port Scan

- id: s3
  plugin: web_recon
  plugin_path: plugins/golden/web_recon
  timeout: 300
  description: Technology Detection, SSL Analysis, HTTP Fingerprinting

- id: s4
  plugin: llm_analysis
  plugin_path: plugins/golden/llm_analysis
  timeout: 120
  description: AI-Powered Vulnerability Correlation

- id: s5
  plugin: reporting
  plugin_path: plugins/golden/reporting
  timeout: 60
  description: Generate Multi-Format Reports
