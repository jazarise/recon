# Build cross-platform release binaries on every `vX.Y.Z` tag push and attach
# them to the matching GitHub Release. The portwave `--update` flag relies on
# this — it pulls the asset whose name matches the host's target triple.
#
# Note on macOS Intel: GitHub-hosted macos-13 (Intel) runners have very
# limited capacity and routinely sit in the queue for 30+ minutes. We build
# both Mac architectures from a single macos-14 (Apple Silicon) runner via
# Apple's bundled cross-toolchain. macos-14 always picks up immediately and
# can produce both aarch64-apple-darwin and x86_64-apple-darwin binaries in
# one job.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    # Pinned to 22.04 so the built binary links against GLIBC 2.35 (the
    # baseline shared by Ubuntu 22.04 LTS, Debian 12, RHEL 9, and every
    # newer distro). `ubuntu-latest` drifts to 24.04 (GLIBC 2.39), which
    # breaks `portwave --update` for every user on an LTS that hasn't
    # rolled yet. Pinning trades "always the newest kernel/tools" for
    # "always runs on a long-supported kernel", which is the right
    # tradeoff for a single-binary release artifact.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with: { key: linux-x86_64 }
      - run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar czf ../../../portwave-x86_64-unknown-linux-gnu.tar.gz portwave
      - name: Extract release notes from commit body
        run: |
          # portwave ships by direct push (no PRs), so GitHub's
          # generate_release_notes produces empty bodies. Use the commit
          # body — everything after the first blank line of the HEAD
          # commit message — as the release body instead.
          git log -1 --pretty=format:'%b' HEAD > release_notes.md
          # Fallback: if the commit had no body, use the tag annotation.
          if [ ! -s release_notes.md ]; then
            git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" > release_notes.md
          fi
          echo '--- release_notes.md ---'
          cat release_notes.md
      - uses: softprops/action-gh-release@v2
        with:
          files: portwave-x86_64-unknown-linux-gnu.tar.gz
          body_path: release_notes.md

  macos:
    # macos-14 = Apple Silicon. Builds aarch64 natively + x86_64 via cross.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with: { key: macos-multi }

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Build x86_64 (cross from ARM)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Package both
        run: |
          cd target/aarch64-apple-darwin/release && tar czf ../../../portwave-aarch64-apple-darwin.tar.gz portwave && cd -
          cd target/x86_64-apple-darwin/release  && tar czf ../../../portwave-x86_64-apple-darwin.tar.gz  portwave && cd -
          ls -la portwave-*.tar.gz

      - name: Extract release notes from commit body
        run: |
          git log -1 --pretty=format:'%b' HEAD > release_notes.md
          if [ ! -s release_notes.md ]; then
            git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" > release_notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            portwave-aarch64-apple-darwin.tar.gz
            portwave-x86_64-apple-darwin.tar.gz
          body_path: release_notes.md

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with: { key: windows-x86_64 }
      - run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path target/x86_64-pc-windows-msvc/release/portwave.exe `
                           -DestinationPath portwave-x86_64-pc-windows-msvc.zip
      - name: Extract release notes from commit body
        shell: bash
        run: |
          git log -1 --pretty=format:'%b' HEAD > release_notes.md
          if [ ! -s release_notes.md ]; then
            git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" > release_notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: portwave-x86_64-pc-windows-msvc.zip
          body_path: release_notes.md
