meta_learning:
  self_optimize: true
  auto_disable_plugins: true
  yield_threshold: 0.05
  learning_cycles: 10
global_intelligence:
  continuous_monitoring: true
  predictive_modeling: true
  noise_suppression: true
  heatmap_enabled: true
saas:
  multi_tenant: true
  multi_region: true
  websocket_port: 8080
  billing_enforcement: true
distributed:
  enabled: true
  workers: 5
  load_balancing: true
queue:
  type: "distributed"
  retries: 3
aggregation:
  deduplicate: true
  global_graph: true
agent:
  enabled: true
  autonomy_level: high
  auto_stop: true
  goal_based_execution: true
  max_cycles: 20
memory:
  enabled: true
  persistence: true
threads: 20
timeout: 5
retries: 3
output_format: json
plugins_enabled:
  - dns_enum
  - subdomain_enum
  - port_scan
  - tech_detect
stealth:
  enabled: false
  jitter_range: [0.2, 1.5]
  passive_only: true
ai_engine:
  enabled: true
  prioritization: true
