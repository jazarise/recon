name: Core Recon Workflow
description: End-to-end asset discovery and enumeration
stages:
  - name: Subdomain Enumeration
    plugin: subfinder
    config:
      threads: 10
  - name: DNS Intelligence
    plugin: dnsx
    config:
      threads: 10
  - name: Port Scanning
    plugin: naabu
    config:
      threads: 10
  - name: HTTP Analysis
    plugin: httpx
    config:
      threads: 10
  - name: Web Crawling
    plugin: katana
    config:
      threads: 10
