name: "Deep Scan Workflow"
description: "A capability-driven workflow for comprehensive reconnaissance"
version: "2.1"
priority: "HIGH"

capabilities:
  - name: "discovery.subdomains"
    description: "Identify subdomains"
    strategy: "ALL" # Use all available adapters (e.g. subfinder, amass)

  - name: "dns.lookup"
    description: "Resolve domains to IPs"
    strategy: "FASTEST"

  - name: "web.probe"
    description: "Probe for live servers"
    strategy: "FASTEST"

  - name: "content.crawl"
    description: "Crawl web interfaces"
    strategy: "MOST_ACCURATE"

  - name: "vuln.xss"
    description: "Scan for XSS"
    strategy: "ALL"

  - name: "report.json"
    description: "Output results as JSON"
