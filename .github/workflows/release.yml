name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip build twine
    - name: Build package
      run: python -m build
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*
