name: ReconX CI

on:
  push:
  pull_request:

jobs:
  quality:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: pip install pytest pytest-cov ruff mypy bandit

      - run: pytest

      - run: ruff check .

      - run: mypy src

      - run: bandit -r src
